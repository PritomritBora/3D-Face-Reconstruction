# Real-Time 3D Mesh Generation Pipeline — Configuration
# ─────────────────────────────────────────────────────
# THIS IS THE FILE TO EDIT to tune the pipeline.
# Changes here take effect immediately on the next run — no code changes needed.
# pipeline/config.py is the loader and should not be edited.

# ── Input ──────────────────────────────────────────────────────────
input:
  max_input_frames: 100   # Subsample input to this many frames before processing
                           # (evenly spaced to maintain coverage)
  blur_threshold_pct: 80  # Keep top X% sharpest frames (center-crop Laplacian)

# ── Feature Extraction (COLMAP SfM) ────────────────────────────────
colmap:
  max_features: 8192        # SIFT keypoints per image (more = slower, better on low-texture)
  peak_threshold: 0.004     # SIFT peak threshold (lower = more keypoints, default 0.0066)
  exhaustive_limit: 100      # Use exhaustive matching below this frame count (O(n²)),
                             # sequential matching above (faster, slightly lower quality)

# ── Reconstruction (sparse point cloud) ────────────────────────────
reconstruction:
  outlier_std_ratio: 1.0  # Statistical outlier removal aggressiveness (lower = tighter)
  depth_filter_ratio: 1.3 # Apply foreground depth filter when far/near > this ratio

# ── Meshing (Poisson + cleanup) ─────────────────────────────────────
meshing:
  max_faces: 50000        # Target face count after decimation
  poisson_depth_sparse: 7 # Poisson depth for sparse clouds (<50K points)
  poisson_depth_dense: 9  # Poisson depth for dense clouds (>50K points)
  centroid_std: 1.0       # Centroid crop threshold (lower = tighter crop)
  smooth_iterations: 3    # Laplacian smoothing iterations
